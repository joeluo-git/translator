<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0d12">
<title>即時翻譯</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+TC:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0d0d12; --surface: #16161f; --card: #1e1e2a; --border: #2a2a3a;
    --accent: #5b7fff; --accent2: #a78bfa; --live: #34d399;
    --text: #e8e8f0; --muted: #6b6b80; --danger: #f87171;
    --deepl: #0f2b46;
  }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Inter', 'Noto Sans TC', sans-serif; }
  .app { display: flex; flex-direction: column; height: 100%; padding-top: env(safe-area-inset-top,0px); padding-bottom: env(safe-area-inset-bottom,0px); }

  .header { flex-shrink:0; background:var(--surface); border-bottom:1px solid var(--border); padding:12px 16px 10px; display:flex; align-items:center; gap:10px; }
  .logo-dot { width:8px; height:8px; background:var(--accent); border-radius:50%; box-shadow:0 0 8px var(--accent); flex-shrink:0; }
  .header h1 { font-size:15px; font-weight:600; flex:1; }
  .header-sub { font-size:11px; color:var(--muted); margin-left:2px; }

  /* Engine toggle */
  .engine-toggle { display:flex; background:var(--card); border:1px solid var(--border); border-radius:8px; overflow:hidden; flex-shrink:0; }
  .engine-btn { padding:5px 10px; font-size:11px; font-weight:500; font-family:inherit; border:none; background:none; color:var(--muted); cursor:pointer; transition:all 0.2s; white-space:nowrap; }
  .engine-btn.active { background:var(--accent); color:white; }
  .engine-btn.active.deepl-active { background:#0066cc; }

  .lang-bar { flex-shrink:0; background:var(--surface); border-bottom:1px solid var(--border); padding:10px 16px; display:flex; align-items:center; gap:8px; }
  .lang-chip { flex:1; display:flex; flex-direction:column; gap:3px; }
  .lang-chip label { font-size:10px; color:var(--muted); font-weight:600; letter-spacing:0.05em; text-transform:uppercase; }
  select { background:var(--card); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:8px 10px; font-size:13px; font-family:inherit; width:100%; outline:none; -webkit-appearance:none; }
  .arrow-icon { color:var(--muted); font-size:16px; flex-shrink:0; padding-top:18px; }

  .feed { flex:1; overflow-y:auto; padding:12px 14px; display:flex; flex-direction:column; gap:10px; -webkit-overflow-scrolling:touch; }
  .feed::-webkit-scrollbar { display:none; }

  .entry { border-radius:14px; padding:12px 14px; animation:pop 0.2s ease; }
  @keyframes pop { from{opacity:0;transform:scale(0.97) translateY(4px)} to{opacity:1;transform:none} }

  .entry-orig { background:var(--card); border:1px solid var(--border); align-self:flex-start; max-width:88%; }
  .entry-trans { background:rgba(91,127,255,0.12); border:1px solid rgba(91,127,255,0.3); align-self:flex-end; max-width:88%; text-align:right; }
  .entry-trans.by-deepl { background:rgba(0,102,204,0.12); border-color:rgba(0,102,204,0.3); }
  .entry.interim-bubble { background:rgba(91,127,255,0.06); border:1px dashed var(--accent); align-self:flex-start; max-width:88%; opacity:0.75; }
  .entry.translating-bubble { background:rgba(167,139,250,0.08); border:1px dashed var(--accent2); align-self:flex-end; max-width:88%; text-align:right; }

  .entry-label { font-size:10px; color:var(--muted); margin-bottom:4px; display:flex; align-items:center; gap:5px; }
  .entry-trans .entry-label { justify-content:flex-end; }
  .entry-text { font-size:16px; line-height:1.55; color:var(--text); word-break:break-word; font-family:'Noto Sans TC',sans-serif; }
  .translating-text { font-size:14px; color:var(--accent2); font-style:italic; }

  .empty-state { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; color:var(--muted); text-align:center; padding:40px 24px; }
  .empty-icon { font-size:48px; opacity:0.3; }
  .empty-state p { font-size:14px; line-height:1.7; }

  .bottom-bar { flex-shrink:0; background:var(--surface); border-top:1px solid var(--border); padding:12px 16px; display:flex; align-items:center; gap:10px; }
  .status-pill { flex:1; font-size:12px; color:var(--muted); display:flex; align-items:center; gap:6px; }
  .status-dot { width:7px; height:7px; border-radius:50%; background:var(--muted); flex-shrink:0; transition:background 0.3s; }
  .status-dot.live { background:var(--live); box-shadow:0 0 6px var(--live); animation:blink 1.2s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }

  .btn-clear { background:none; border:1px solid var(--border); color:var(--muted); padding:8px 14px; border-radius:8px; font-size:12px; font-family:inherit; cursor:pointer; flex-shrink:0; }
  .btn-mic { width:56px; height:56px; border-radius:50%; border:none; background:var(--accent); color:white; font-size:22px; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 16px rgba(91,127,255,0.4); transition:all 0.2s; }
  .btn-mic:active { transform:scale(0.93); }
  .btn-mic.recording { background:var(--danger); animation:pulse-mic 1.4s ease-in-out infinite; }
  @keyframes pulse-mic { 0%{box-shadow:0 0 0 0 rgba(248,113,113,0.5)} 70%{box-shadow:0 0 0 14px rgba(248,113,113,0)} 100%{box-shadow:0 0 0 0 rgba(248,113,113,0)} }

  .browser-warn { background:#2a1a0a; color:#fbbf24; padding:10px 14px; font-size:12px; text-align:center; display:none; flex-shrink:0; }
  .browser-warn.show { display:block; }

  /* DeepL note */
  .deepl-note { font-size:10px; color:#0066cc; margin-left:4px; }
</style>
</head>
<body>
<div class="app">
  <div class="browser-warn" id="browserWarn">⚠️ 請用 Chrome（Android）或 Safari（iOS）開啟，才支援語音辨識。</div>

  <div class="header">
    <div class="logo-dot"></div>
    <h1>即時翻譯<span class="header-sub"> Live</span></h1>
    <div class="engine-toggle">
      <button class="engine-btn active" id="btnGoogle" onclick="setEngine('google')">Google</button>
      <button class="engine-btn" id="btnDeepl" onclick="setEngine('deepl')">DeepL</button>
    </div>
  </div>

  <div class="lang-bar">
    <div class="lang-chip">
      <label>聆聽語言</label>
      <select id="inputLang">
        <option value="hi-IN">🇮🇳 印地語</option>
        <option value="ko-KR">🇰🇷 韓語</option>
        <option value="ja-JP">🇯🇵 日語</option>
        <option value="en-US">🇺🇸 英語</option>
        <option value="zh-TW">🇹🇼 中文(台)</option>
        <option value="zh-CN">🇨🇳 中文(簡)</option>
        <option value="fr-FR">🇫🇷 法語</option>
        <option value="de-DE">🇩🇪 德語</option>
      </select>
    </div>
    <div class="arrow-icon">→</div>
    <div class="lang-chip">
      <label>翻譯為</label>
      <select id="outputLang">
        <option value="zh-TW">繁體中文</option>
        <option value="en">English</option>
        <option value="zh-CN">简体中文</option>
        <option value="ja">日本語</option>
      </select>
    </div>
  </div>

  <div class="feed" id="feed">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🎙️</div>
      <p>按下麥克風按鈕<br>開始即時翻譯</p>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="status-pill">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">待機中</span>
    </div>
    <button class="btn-clear" onclick="clearAll()">清除</button>
    <button class="btn-mic" id="micBtn" onclick="toggleRecording()">🎤</button>
  </div>
</div>

<script>
  const DEEPL_KEY = '9bc254a7-042a-48e0-b953-7731cab67d08:fx';

  // DeepL lang codes
  const deeplLangMap = {
    'zh-TW': 'ZH', 'en': 'EN', 'zh-CN': 'ZH', 'ja': 'JA'
  };
  // DeepL does NOT support Hindi — fallback to Google for hi-IN
  const deeplUnsupported = ['hi-IN'];

  let engine = 'google'; // 'google' or 'deepl'
  let recognition = null;
  let isRecording = false;
  let interimBubble = null;
  let translationQueue = [];
  let isTranslating = false;
  let hasContent = false;

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) document.getElementById('browserWarn').classList.add('show');

  function setEngine(e) {
    engine = e;
    document.getElementById('btnGoogle').classList.toggle('active', e === 'google');
    document.getElementById('btnDeepl').classList.toggle('active', e === 'deepl');
    document.getElementById('btnDeepl').classList.toggle('deepl-active', e === 'deepl');
  }

  function getTime() {
    return new Date().toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit' });
  }

  function showContent() {
    if (!hasContent) {
      const el = document.getElementById('emptyState');
      if (el) el.remove();
      hasContent = true;
    }
  }

  function toggleRecording() {
    if (isRecording) stopRecording();
    else startRecording();
  }

  function startRecording() {
    if (!SR) return;
    recognition = new SR();
    recognition.lang = document.getElementById('inputLang').value;
    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onstart = () => {
      isRecording = true;
      document.getElementById('micBtn').classList.add('recording');
      document.getElementById('micBtn').textContent = '⏹';
      document.getElementById('statusDot').classList.add('live');
      document.getElementById('statusText').textContent = '錄音中…';
    };

    recognition.onresult = (e) => {
      let interim = '', final = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) final += e.results[i][0].transcript;
        else interim += e.results[i][0].transcript;
      }

      showContent();
      const feed = document.getElementById('feed');

      if (interim) {
        if (!interimBubble) {
          interimBubble = document.createElement('div');
          interimBubble.className = 'entry interim-bubble';
          interimBubble.innerHTML = `<div class="entry-label">辨識中…</div><div class="entry-text"></div>`;
          feed.appendChild(interimBubble);
        }
        interimBubble.querySelector('.entry-text').textContent = interim;
        feed.scrollTop = feed.scrollHeight;
      }

      if (final.trim()) {
        if (interimBubble) { interimBubble.remove(); interimBubble = null; }

        const orig = document.createElement('div');
        orig.className = 'entry entry-orig';
        orig.innerHTML = `<div class="entry-label">${getTime()}</div><div class="entry-text">${esc(final.trim())}</div>`;
        feed.appendChild(orig);

        const trans = document.createElement('div');
        trans.className = 'entry translating-bubble';
        trans.innerHTML = `<div class="entry-label">${getTime()}</div><div class="translating-text">翻譯中…</div>`;
        feed.appendChild(trans);
        feed.scrollTop = feed.scrollHeight;

        translationQueue.push({ text: final.trim(), elem: trans });
        processQueue();
      }
    };

    recognition.onerror = (e) => {
      if (e.error === 'no-speech') return;
      document.getElementById('statusText').textContent = `錯誤: ${e.error}`;
    };

    recognition.onend = () => {
      if (isRecording) recognition.start();
    };

    recognition.start();
  }

  function stopRecording() {
    isRecording = false;
    if (recognition) recognition.stop();
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('micBtn').textContent = '🎤';
    document.getElementById('statusDot').classList.remove('live');
    document.getElementById('statusText').textContent = '已停止';
  }

  async function translateGoogle(text, targetLang) {
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}`;
    const res = await fetch(url);
    const data = await res.json();
    return data[0].map(item => item[0]).filter(Boolean).join('');
  }

  async function translateDeepl(text, targetLang) {
    const dlLang = deeplLangMap[targetLang] || 'EN';
    const res = await fetch('https://api-free.deepl.com/v2/translate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        auth_key: DEEPL_KEY,
        text: text,
        target_lang: dlLang
      })
    });
    const data = await res.json();
    return data.translations[0].text;
  }

  async function processQueue() {
    if (isTranslating || !translationQueue.length) return;
    isTranslating = true;

    const { text, elem } = translationQueue.shift();
    const sel = document.getElementById('outputLang');
    const targetLang = sel.value;
    const inputLang = document.getElementById('inputLang').value;

    // Auto fallback to Google if DeepL doesn't support input language
    const useEngine = (engine === 'deepl' && deeplUnsupported.includes(inputLang)) ? 'google' : engine;
    const engineLabel = useEngine === 'deepl' ? ' · DeepL' : ' · Google';

    try {
      let result;
      if (useEngine === 'deepl') {
        result = await translateDeepl(text, targetLang);
      } else {
        result = await translateGoogle(text, targetLang);
      }

      elem.className = `entry entry-trans${useEngine === 'deepl' ? ' by-deepl' : ''}`;
      elem.innerHTML = `<div class="entry-label">${getTime()} ✦<span class="deepl-note">${engineLabel}</span></div><div class="entry-text">${esc(result)}</div>`;
    } catch(err) {
      elem.className = 'entry entry-trans';
      elem.innerHTML = `<div class="entry-label">${getTime()}</div><div class="entry-text" style="color:var(--danger)">翻譯錯誤，請重試</div>`;
    }

    document.getElementById('feed').scrollTop = document.getElementById('feed').scrollHeight;
    isTranslating = false;
    processQueue();
  }

  function clearAll() {
    stopRecording();
    hasContent = false;
    translationQueue = [];
    interimBubble = null;
    document.getElementById('feed').innerHTML = `<div class="empty-state" id="emptyState"><div class="empty-icon">🎙️</div><p>按下麥克風按鈕<br>開始即時翻譯</p></div>`;
    document.getElementById('statusText').textContent = '待機中';
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
